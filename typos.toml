[default]
# The last two entries ignore content-addressed ids (claim_/conflict_/src_ + hex)
# and bare 8+-char hex tokens (receipt ids, event_ids, journal hashes): the hex can
# spell anything ("...abd...", "...beed...") and appears across the UI + generated
# snapshots. A real English word is never 8+ chars of only [0-9a-f], so this is safe.
extend-ignore-re = [
    "(?i)crate",
    "Ba?tPak",
    "texo",
    "ctxvc",
    "serde",
    "rmcp",
    "\\b(claim|conflict|src)_[0-9a-f]+\\b",
    "\\b[0-9a-f]{8,}\\b",
]

[files]
extend-exclude = [
    "extensions/vscode/node_modules/",
    "extensions/vscode/out/",
    "target/",
    "public/",
    "tests/snapshots/",
    "Cargo.lock",
    # Built UI artifacts: minified bundles and the generated drift snapshot.
    "ui/dist/",
    "ui/public/drift.json",
    "ui/pnpm-lock.yaml",
    "ui/node_modules/",
]
