name: ci

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    # Comfortable ceiling for a cold first build of the expanded graph; cached
    # runs finish far faster. A hang fails cleanly with logs instead of an opaque
    # runner crash.
    timeout-minutes: 60
    env:
      CARGO_INCREMENTAL: "0"
      CARGO_TERM_COLOR: always
      CARGO_NET_RETRY: "3"
      RUST_BACKTRACE: "1"
      # Bound only the test RUN's threads (cheap memory insurance) — NOT build
      # parallelism, which we want at full core count for speed.
      RUST_TEST_THREADS: "2"
    steps:
      - uses: actions/checkout@v4
      # Reclaim ~20GB of unused preinstalled toolchains so the build can't hit the
      # "Disk quota exceeded" wall AGENTS.md documents (the likely original crash).
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
            /usr/local/share/boost /usr/local/.ghcup "$AGENT_TOOLSDIRECTORY" || true
          df -h /
      - uses: dtolnay/rust-toolchain@1.92.0
        with:
          components: rustfmt, clippy
      # Cache compiled dependencies so only the first run pays the full cold
      # build; later runs are fast.
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@just
      - uses: taiki-e/install-action@typos-cli
      # Precompiled cargo-deny (no ~2.5min source build per run).
      - uses: taiki-e/install-action@cargo-deny
      - run: just verify
      - run: just demo-intelligence
      - run: just demo
      - run: just drift
        continue-on-error: true
      - run: just ext-package
      - run: cargo run --bin texo -- verify --json
