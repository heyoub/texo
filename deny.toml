[graph]
targets = ["x86_64-unknown-linux-gnu"]
all-features = true

[licenses]
allow = ["MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "Unicode-3.0", "ISC", "Zlib", "CDLA-Permissive-2.0"]
confidence-threshold = 0.8

[bans]
multiple-versions = "allow"
wildcards = "deny"
deny = [
  { name = "tokio" }, { name = "reqwest" }, { name = "axum" },
  { name = "tower" }, { name = "rmcp" }, { name = "schemars" },
  { name = "anyhow" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
