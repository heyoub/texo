[graph]
targets = ["x86_64-unknown-linux-gnu"]
all-features = true

[advisories]
ignore = []

[licenses]
allow = ["MIT", "Apache-2.0", "BSD-2-Clause", "Unicode-3.0", "ISC", "Zlib", "OpenSSL", "MPL-2.0"]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
