[graph]
targets = ["x86_64-unknown-linux-gnu"]
all-features = true

[advisories]
ignore = [
  # paste: unmaintained build-time proc-macro, transitive via fastembed/image
  # (local-onnx feature only; not in the default OpenRouter build). Low risk.
  "RUSTSEC-2024-0436",
]

[licenses]
allow = ["MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause", "Unicode-3.0", "ISC", "Zlib", "OpenSSL", "MPL-2.0", "CDLA-Permissive-2.0"]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
